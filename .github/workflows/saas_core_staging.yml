name: SaaS Core Staging

on:
  workflow_dispatch:
    inputs:
      run_local_smoke:
        description: "Run local SaaS Wave0 smoke before staging steps"
        required: false
        type: boolean
        default: true
      apply_migrations:
        description: "Apply pending Supabase migrations after dry-run"
        required: false
        type: boolean
        default: false
      deploy_functions:
        description: "Deploy Edge Functions after migrations"
        required: false
        type: boolean
        default: false
      run_function_smoke:
        description: "Run deployed Functions smoke after deploy"
        required: false
        type: boolean
        default: false
      build_apk:
        description: "Build dev debug APK with staging dart-defines"
        required: false
        type: boolean
        default: true

concurrency:
  group: saas-core-staging-${{ github.ref }}
  cancel-in-progress: false

jobs:
  core_staging:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.35.5
          channel: stable
          cache: true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Create staging env file
        env:
          SUPABASE_URL: ${{ secrets.STAGING_SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.STAGING_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.STAGING_SUPABASE_SERVICE_ROLE_KEY }}
          GOOGLE_SERVICE_ACCOUNT_EMAIL: ${{ secrets.STAGING_GOOGLE_SERVICE_ACCOUNT_EMAIL }}
          GOOGLE_SERVICE_ACCOUNT_PRIVATE_KEY: ${{ secrets.STAGING_GOOGLE_SERVICE_ACCOUNT_PRIVATE_KEY }}
          GOOGLE_PLAY_PACKAGE_NAME: ${{ secrets.STAGING_GOOGLE_PLAY_PACKAGE_NAME }}
          APPLE_APP_STORE_BUNDLE_ID: ${{ secrets.STAGING_APPLE_APP_STORE_BUNDLE_ID }}
          APPLE_APP_STORE_SHARED_SECRET: ${{ secrets.STAGING_APPLE_APP_STORE_SHARED_SECRET }}
          APPLE_APP_STORE_APPLE_ID: ${{ secrets.STAGING_APPLE_APP_STORE_APPLE_ID }}
          APPLE_APP_STORE_ENVIRONMENT: ${{ secrets.STAGING_APPLE_APP_STORE_ENVIRONMENT }}
          PUBSUB_BEARER_TOKEN: ${{ secrets.STAGING_PUBSUB_BEARER_TOKEN }}
          WEBHOOK_HMAC_SECRET: ${{ secrets.STAGING_WEBHOOK_HMAC_SECRET }}
          ADMIN_API_TOKEN: ${{ secrets.STAGING_ADMIN_API_TOKEN }}
          ADMIN_API_ALLOWED_ORIGINS: ${{ secrets.STAGING_ADMIN_API_ALLOWED_ORIGINS }}
          ANALYTICS_ADMIN_TOKEN: ${{ secrets.STAGING_ANALYTICS_ADMIN_TOKEN }}
          NOTIFICATION_ADMIN_TOKEN: ${{ secrets.STAGING_NOTIFICATION_ADMIN_TOKEN }}
        run: |
          set -euo pipefail
          env_file="$RUNNER_TEMP/jive-saas-staging.env"
          touch "$env_file"
          chmod 600 "$env_file"
          {
            printf 'SUPABASE_URL=%s\n' "$SUPABASE_URL"
            printf 'SUPABASE_ANON_KEY=%s\n' "$SUPABASE_ANON_KEY"
            printf 'SUPABASE_SERVICE_ROLE_KEY=%s\n' "$SUPABASE_SERVICE_ROLE_KEY"
            printf 'GOOGLE_SERVICE_ACCOUNT_EMAIL=%s\n' "$GOOGLE_SERVICE_ACCOUNT_EMAIL"
            printf 'GOOGLE_SERVICE_ACCOUNT_PRIVATE_KEY=%s\n' "$GOOGLE_SERVICE_ACCOUNT_PRIVATE_KEY"
            printf 'GOOGLE_PLAY_PACKAGE_NAME=%s\n' "$GOOGLE_PLAY_PACKAGE_NAME"
            printf 'APPLE_APP_STORE_BUNDLE_ID=%s\n' "$APPLE_APP_STORE_BUNDLE_ID"
            printf 'APPLE_APP_STORE_SHARED_SECRET=%s\n' "$APPLE_APP_STORE_SHARED_SECRET"
            printf 'APPLE_APP_STORE_APPLE_ID=%s\n' "$APPLE_APP_STORE_APPLE_ID"
            printf 'APPLE_APP_STORE_ENVIRONMENT=%s\n' "$APPLE_APP_STORE_ENVIRONMENT"
            printf 'PUBSUB_BEARER_TOKEN=%s\n' "$PUBSUB_BEARER_TOKEN"
            printf 'WEBHOOK_HMAC_SECRET=%s\n' "$WEBHOOK_HMAC_SECRET"
            printf 'ADMIN_API_TOKEN=%s\n' "$ADMIN_API_TOKEN"
            printf 'ADMIN_API_ALLOWED_ORIGINS=%s\n' "$ADMIN_API_ALLOWED_ORIGINS"
            printf 'ANALYTICS_ADMIN_TOKEN=%s\n' "$ANALYTICS_ADMIN_TOKEN"
            printf 'NOTIFICATION_ADMIN_TOKEN=%s\n' "$NOTIFICATION_ADMIN_TOKEN"
          } > "$env_file"
          echo "STAGING_ENV_FILE=$env_file" >> "$GITHUB_ENV"

      - name: Guard deploy secrets
        if: ${{ inputs.deploy_functions || inputs.run_function_smoke }}
        env:
          PUBSUB_BEARER_TOKEN: ${{ secrets.STAGING_PUBSUB_BEARER_TOKEN }}
          WEBHOOK_HMAC_SECRET: ${{ secrets.STAGING_WEBHOOK_HMAC_SECRET }}
          ADMIN_API_TOKEN: ${{ secrets.STAGING_ADMIN_API_TOKEN }}
          ADMIN_API_ALLOWED_ORIGINS: ${{ secrets.STAGING_ADMIN_API_ALLOWED_ORIGINS }}
          ANALYTICS_ADMIN_TOKEN: ${{ secrets.STAGING_ANALYTICS_ADMIN_TOKEN }}
          NOTIFICATION_ADMIN_TOKEN: ${{ secrets.STAGING_NOTIFICATION_ADMIN_TOKEN }}
        run: |
          set -euo pipefail
          missing=()
          for key in \
            PUBSUB_BEARER_TOKEN \
            WEBHOOK_HMAC_SECRET \
            ADMIN_API_TOKEN \
            ADMIN_API_ALLOWED_ORIGINS \
            ANALYTICS_ADMIN_TOKEN \
            NOTIFICATION_ADMIN_TOKEN; do
            if [[ -z "${!key:-}" ]]; then
              missing+=("STAGING_$key")
            fi
          done
          if (( ${#missing[@]} > 0 )); then
            printf 'Missing required GitHub Secrets for deploy/function smoke:\n' >&2
            printf ' - %s\n' "${missing[@]}" >&2
            exit 1
          fi

      - name: Run core staging lane
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.STAGING_SUPABASE_ACCESS_TOKEN }}
          STAGING_PROJECT_REF: ${{ secrets.STAGING_PROJECT_REF }}
          STAGING_DB_PASSWORD: ${{ secrets.STAGING_DB_PASSWORD }}
          SUPABASE_FUNCTIONS_URL: ${{ secrets.STAGING_SUPABASE_FUNCTIONS_URL }}
        run: |
          set -euo pipefail
          args=(--env-file "$STAGING_ENV_FILE")

          if [[ "${{ inputs.run_local_smoke }}" != "true" ]]; then
            args+=(--skip-local-smoke)
          fi

          if [[ "${{ inputs.apply_migrations }}" != "true" ]]; then
            args+=(--skip-apply)
          fi

          if [[ "${{ inputs.deploy_functions }}" != "true" ]]; then
            args+=(--skip-deploy)
          fi

          if [[ "${{ inputs.run_function_smoke }}" != "true" ]]; then
            args+=(--skip-function-smoke)
          fi

          if [[ "${{ inputs.build_apk }}" != "true" ]]; then
            args+=(--skip-apk)
          fi

          bash scripts/run_saas_core_staging_lane.sh "${args[@]}"

      - name: Upload SaaS staging reports
        if: always()
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: saas-staging-reports-${{ github.run_id }}
          path: |
            build/reports/saas-staging
            build/saas-staging
          if-no-files-found: warn
