name: Flutter CI

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - labeled
      - unlabeled
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      run_android_e2e:
        description: "Run Android integration_test on emulator"
        required: false
        type: boolean
        default: false
      run_saas_wave0_smoke:
        description: "Run SaaS Wave 0 smoke lane"
        required: false
        type: boolean
        default: false

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze_and_test:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Detect category icon asset-only PR
        id: asset_only
        if: github.event_name == 'pull_request'
        shell: bash
        run: |
          changed_files="$(git -c core.quotepath=false diff --name-only HEAD^1 HEAD^2)"
          non_asset_files="$(printf '%s\n' "$changed_files" | grep -Ev '^(assets/category_icons/|\.github/workflows/flutter_ci\.yml$)' || true)"
          printf '%s\n' "$changed_files"

          if [ -n "$changed_files" ] && [ -z "$non_asset_files" ]; then
            echo "skip_flutter=true" >> "$GITHUB_OUTPUT"
          else
            printf 'Non-asset files:\n%s\n' "$non_asset_files"
            echo "skip_flutter=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Skip Flutter checks for category icon asset-only PR
        if: steps.asset_only.outputs.skip_flutter == 'true'
        run: echo "Only category icon assets changed; skipping Flutter analyze/test."

      - name: Setup Flutter
        if: steps.asset_only.outputs.skip_flutter != 'true'
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.35.5
          channel: stable
          cache: true

      - name: Flutter Version
        if: steps.asset_only.outputs.skip_flutter != 'true'
        run: flutter --version

      - name: Install Dependencies
        if: steps.asset_only.outputs.skip_flutter != 'true'
        run: flutter pub get

      - name: Analyze
        if: steps.asset_only.outputs.skip_flutter != 'true'
        run: flutter analyze --no-fatal-infos

      - name: Test
        if: steps.asset_only.outputs.skip_flutter != 'true'
        run: flutter test

  detect_saas_wave0_smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      should_run: ${{ steps.detect.outputs.should_run }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect SaaS Wave 0 smoke trigger
        id: detect
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            if [[ "${{ github.event.inputs.run_saas_wave0_smoke }}" == "true" ]]; then
              echo "should_run=true" >> "$GITHUB_OUTPUT"
            else
              echo "should_run=false" >> "$GITHUB_OUTPUT"
            fi
            exit 0
          fi

          if [[ "${{ github.event_name }}" == "pull_request" ]] && [[ "${{ contains(github.event.pull_request.labels.*.name, 'saas') }}" == "true" ]]; then
            echo "SaaS label present; smoke lane will run."
            echo "should_run=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          changed_files="$(mktemp)"
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            if git rev-parse --verify HEAD^2 >/dev/null 2>&1; then
              git -c core.quotepath=false diff --name-only HEAD^1 HEAD^2 > "$changed_files"
            else
              git -c core.quotepath=false diff --name-only "${{ github.event.pull_request.base.sha }}" "${{ github.event.pull_request.head.sha }}" > "$changed_files"
            fi
          elif [[ "${{ github.event_name }}" == "push" ]]; then
            before_sha="${{ github.event.before }}"
            if [[ -n "$before_sha" ]] && [[ "$before_sha" != "0000000000000000000000000000000000000000" ]] && git cat-file -e "$before_sha^{commit}" 2>/dev/null; then
              git -c core.quotepath=false diff --name-only "$before_sha" HEAD > "$changed_files"
            elif git rev-parse --verify HEAD^1 >/dev/null 2>&1; then
              git -c core.quotepath=false diff --name-only HEAD^1 HEAD > "$changed_files"
            else
              git -c core.quotepath=false diff-tree --no-commit-id --name-only -r HEAD > "$changed_files"
            fi
          else
            : > "$changed_files"
          fi

          echo "Changed files considered for SaaS Wave 0 smoke:"
          cat "$changed_files"

          should_run="$(bash scripts/should_run_saas_wave0_smoke.sh < "$changed_files")"
          echo "should_run=$should_run" >> "$GITHUB_OUTPUT"
          echo "SaaS Wave 0 smoke should_run=$should_run"

  saas_wave0_smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: detect_saas_wave0_smoke
    if: needs.detect_saas_wave0_smoke.outputs.should_run == 'true'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.35.5
          channel: stable
          cache: true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run SaaS Wave 0 smoke lane
        run: bash scripts/run_saas_wave0_smoke.sh

  android_integration_test:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    if: >-
      (github.event_name == 'workflow_dispatch' && github.event.inputs.run_android_e2e == 'true') ||
      (github.event_name == 'pull_request' && contains(github.event.pull_request.labels.*.name, 'e2e'))

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.35.5
          channel: stable
          cache: true

      - name: Install Dependencies
        run: flutter pub get

      - name: Run Android integration_test (emulator)
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          target: google_apis
          arch: x86_64
          disable-animations: true
          script: >-
            bash scripts/run_android_integration_ci.sh transaction_search_flow

      - name: Upload Android integration artifacts
        if: always()
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: android-integration-artifacts-${{ github.run_id }}
          path: ci_artifacts/android_integration
          if-no-files-found: warn
