name: Flutter CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      run_android_e2e:
        description: "Run Android integration_test on emulator"
        required: false
        type: boolean
        default: false

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze_and_test:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.35.5
          channel: stable
          cache: true

      - name: Cache Pub dependencies
        uses: actions/cache@v4
        with:
          path: ~/.pub-cache
          key: ${{ runner.os }}-pub-${{ hashFiles('pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-pub-

      - name: Flutter Version
        run: flutter --version

      - name: Install Dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze

      - name: Test
        run: flutter test

  android_integration_test:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    if: >-
      (github.event_name == 'workflow_dispatch' && github.event.inputs.run_android_e2e == 'true') ||
      (github.event_name == 'pull_request' && contains(github.event.pull_request.labels.*.name, 'e2e'))

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Free disk space for emulator
        run: |
          echo "Disk before cleanup:"
          df -h
          sudo rm -rf /usr/share/dotnet || true
          sudo rm -rf /usr/share/swift || true
          sudo rm -rf /opt/ghc || true
          sudo rm -rf /usr/local/.ghcup || true
          sudo apt-get clean
          echo "Disk after cleanup:"
          df -h

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.35.5
          channel: stable
          cache: true

      - name: Cache Pub dependencies
        uses: actions/cache@v4
        with:
          path: ~/.pub-cache
          key: ${{ runner.os }}-pub-${{ hashFiles('pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-pub-

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('android/**/*.gradle*', 'android/gradle.properties', 'android/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Install Dependencies
        run: flutter pub get

      - name: Pre-install Android SDK components
        run: |
          set -euo pipefail
          SDK_ROOT="${ANDROID_HOME:-${ANDROID_SDK_ROOT:-/usr/local/lib/android/sdk}}"
          SDKMANAGER_BIN="${SDK_ROOT}/cmdline-tools/latest/bin/sdkmanager"
          if [ ! -x "${SDKMANAGER_BIN}" ]; then
            if command -v sdkmanager >/dev/null 2>&1; then
              SDKMANAGER_BIN="$(command -v sdkmanager)"
            else
              echo "::warning::sdkmanager not found; skipping explicit SDK component pre-install."
              exit 0
            fi
          fi
          yes | "${SDKMANAGER_BIN}" --licenses >/dev/null || true
          APP_COMPILE_SDK="$(awk -F'=' '/compileSdk[[:space:]]*=/{gsub(/[^0-9]/, "", $2); if ($2 != "") { print $2; exit }}' android/app/build.gradle.kts || true)"
          MANDATORY_PACKAGES=(
            "platform-tools"
            "platforms;android-33"
            "build-tools;35.0.0"
            "cmake;3.22.1"
            "ndk;27.0.12077973"
          )
          OPTIONAL_PACKAGES=()
          if [[ "${APP_COMPILE_SDK}" =~ ^[0-9]+$ ]]; then
            OPTIONAL_PACKAGES+=("platforms;android-${APP_COMPILE_SDK}")
            OPTIONAL_PACKAGES+=("build-tools;${APP_COMPILE_SDK}.0.0")
          fi

          echo "Mandatory SDK packages: ${MANDATORY_PACKAGES[*]}"
          timeout 900 "${SDKMANAGER_BIN}" "${MANDATORY_PACKAGES[@]}"

          if ((${#OPTIONAL_PACKAGES[@]} > 0)); then
            echo "Optional SDK packages: ${OPTIONAL_PACKAGES[*]}"
            set +e
            timeout 600 "${SDKMANAGER_BIN}" "${OPTIONAL_PACKAGES[@]}"
            OPTIONAL_EXIT=$?
            set -e
            if [ "${OPTIONAL_EXIT}" -ne 0 ]; then
              echo "::warning::Optional compileSdk SDK packages install failed (exit ${OPTIONAL_EXIT}); Gradle will resolve missing pieces on demand."
            fi
          fi

      - name: Enable KVM for emulator
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm
          ls -l /dev/kvm || true

      - name: Initialize Android integration summary placeholder
        run: |
          mkdir -p "${{ runner.temp }}/jive-integration"
          cat > "${{ runner.temp }}/jive-integration/suite-summary.txt" <<EOF
          suite_started_at=0
          suite_finished_at=0
          suite_elapsed_seconds=0
          suite_elapsed_human=unknown
          script_exit_code=999
          script_result=unknown
          interrupted_reason=not_started_or_emulator_boot_failure
          combined_suite_mode=1
          retry_count=0
          test_files_count=0
          summary_entries_count=0
          failed_tests_count=0
          artifacts_dir=${{ runner.temp }}/jive-integration
          EOF

      - name: Prewarm Android build toolchain
        run: |
          set -euo pipefail
          export GRADLE_OPTS="-Dorg.gradle.daemon=false -Dorg.gradle.workers.max=2"
          set +e
          timeout 1200 flutter build apk --debug --flavor dev --dart-define=JIVE_E2E=true --no-pub
          PREWARM_EXIT=$?
          set -e
          if [ "${PREWARM_EXIT}" -ne 0 ]; then
            echo "::warning::Prewarm failed with exit ${PREWARM_EXIT}; continuing to emulator test run."
          fi

      - name: Run Android integration_test (emulator)
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 33
          target: google_apis
          arch: x86_64
          profile: Nexus 6
          cores: 4
          ram-size: 4096M
          heap-size: 1024M
          sdcard-path-or-size: 512M
          disk-size: 4096M
          emulator-boot-timeout: 420
          emulator-options: -no-window -no-snapshot -noaudio -no-boot-anim -no-metrics -gpu swiftshader_indirect
          disable-linux-hw-accel: false
          pre-emulator-launch-script: |
            adb kill-server || true
            adb start-server
            adb devices
          disable-animations: true
          script: |
            export GRADLE_OPTS="-Dorg.gradle.daemon=false -Dorg.gradle.workers.max=2"
            mkdir -p "${{ runner.temp }}/jive-integration"
            flutter devices
            timeout 1800 bash scripts/run_integration_tests.sh --combined-suite --skip-pub-get --retry 0 --timeout 720 --test-case-timeout 20m --ignore-test-timeouts --device-recovery-retry 2 --device-recovery-timeout 60 --allow-emulator-reboot --artifact-dir "${{ runner.temp }}/jive-integration" --summary-file "${{ runner.temp }}/jive-integration/suite-summary.txt" emulator-5554

      - name: Append Android integration summary
        if: always()
        run: |
          SUMMARY_FILE="${RUNNER_TEMP}/jive-integration/suite-summary.txt"
          if [ -x "scripts/render_integration_summary.sh" ]; then
            bash scripts/render_integration_summary.sh "${SUMMARY_FILE}" >> "${GITHUB_STEP_SUMMARY}"
          else
            {
              echo "## Android integration summary"
              echo ""
              echo "summary renderer script not found or not executable: scripts/render_integration_summary.sh"
            } >> "${GITHUB_STEP_SUMMARY}"
          fi

      - name: Upload Android integration artifacts
        if: always()
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: android-integration-${{ github.run_id }}-${{ github.run_attempt }}
          path: ${{ runner.temp }}/jive-integration
          if-no-files-found: warn
          retention-days: 7
