name: Flutter CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      run_android_e2e:
        description: "Run Android integration_test on emulator"
        required: false
        type: boolean
        default: false

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze_and_test:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.35.5
          channel: stable
          cache: true

      - name: Flutter Version
        run: flutter --version

      - name: Install Dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze

      - name: Test
        run: flutter test

  android_integration_test:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    if: >-
      (github.event_name == 'workflow_dispatch' && github.event.inputs.run_android_e2e == 'true') ||
      (github.event_name == 'pull_request' && contains(github.event.pull_request.labels.*.name, 'e2e'))

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.35.5
          channel: stable
          cache: true

      - name: Install Dependencies
        run: flutter pub get

      - name: Run Android integration_test (emulator)
        uses: reactivecircus/android-emulator-runner@v2
        env:
          FLUTTER_IGNORE_TIMEOUTS: "1"
          FLUTTER_TEST_TIMEOUT: "none"
          FLUTTER_TIMEOUT_SECONDS: "2700"
        with:
          api-level: 34
          target: google_apis
          arch: x86_64
          emulator-boot-timeout: 1200
          disable-animations: false
          script: >-
            bash scripts/run_android_integration_ci.sh transaction_search_flow

      - name: Upload Android integration artifacts
        if: always()
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: android-integration-artifacts-${{ github.run_id }}
          path: ci_artifacts/android_integration
          if-no-files-found: warn
