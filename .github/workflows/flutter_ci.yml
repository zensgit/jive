name: Flutter CI

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - labeled
      - unlabeled
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      run_android_e2e:
        description: "Run Android integration_test on emulator"
        required: false
        type: boolean
        default: false
      run_saas_wave0_smoke:
        description: "Run SaaS Wave 0 smoke lane"
        required: false
        type: boolean
        default: false

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze_and_test:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect category icon asset-only PR
        id: asset_only
        if: github.event_name == 'pull_request'
        shell: bash
        run: |
          changed_files="$(git diff --name-only HEAD^1 HEAD^2)"
          printf '%s\n' "$changed_files"

          if [ -n "$changed_files" ] &&
             ! printf '%s\n' "$changed_files" | grep -Ev '^(assets/category_icons/|\.github/workflows/flutter_ci\.yml$)' >/dev/null; then
            echo "skip_flutter=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip_flutter=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Skip Flutter checks for category icon asset-only PR
        if: steps.asset_only.outputs.skip_flutter == 'true'
        run: echo "Only category icon assets changed; skipping Flutter analyze/test."

      - name: Setup Flutter
        if: steps.asset_only.outputs.skip_flutter != 'true'
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.35.5
          channel: stable
          cache: true

      - name: Flutter Version
        if: steps.asset_only.outputs.skip_flutter != 'true'
        run: flutter --version

      - name: Install Dependencies
        if: steps.asset_only.outputs.skip_flutter != 'true'
        run: flutter pub get

      - name: Analyze
        if: steps.asset_only.outputs.skip_flutter != 'true'
        run: flutter analyze

      - name: Test
        if: steps.asset_only.outputs.skip_flutter != 'true'
        run: flutter test

  saas_wave0_smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    if: >-
      (github.event_name == 'workflow_dispatch' && github.event.inputs.run_saas_wave0_smoke == 'true') ||
      (github.event_name == 'pull_request' && contains(github.event.pull_request.labels.*.name, 'saas'))

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.35.5
          channel: stable
          cache: true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run SaaS Wave 0 smoke lane
        run: bash scripts/run_saas_wave0_smoke.sh

  android_integration_test:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    if: >-
      (github.event_name == 'workflow_dispatch' && github.event.inputs.run_android_e2e == 'true') ||
      (github.event_name == 'pull_request' && contains(github.event.pull_request.labels.*.name, 'e2e'))

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.35.5
          channel: stable
          cache: true

      - name: Install Dependencies
        run: flutter pub get

      - name: Run Android integration_test (emulator)
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          target: google_apis
          arch: x86_64
          disable-animations: true
          script: >-
            bash scripts/run_android_integration_ci.sh transaction_search_flow

      - name: Upload Android integration artifacts
        if: always()
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: android-integration-artifacts-${{ github.run_id }}
          path: ci_artifacts/android_integration
          if-no-files-found: warn
