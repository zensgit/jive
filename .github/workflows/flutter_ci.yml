name: Flutter CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      run_android_e2e:
        description: "Run Android integration_test on emulator"
        required: false
        type: boolean
        default: false

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze_and_test:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.35.5
          channel: stable
          cache: true

      - name: Flutter Version
        run: flutter --version

      - name: Install Dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze

      - name: Test
        run: flutter test

  android_integration_test:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    if: >-
      (github.event_name == 'workflow_dispatch' && github.event.inputs.run_android_e2e == 'true') ||
      (github.event_name == 'pull_request' && contains(github.event.pull_request.labels.*.name, 'e2e'))

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Free disk space for emulator
        run: |
          echo "Disk before cleanup:"
          df -h
          sudo rm -rf /usr/share/dotnet || true
          sudo rm -rf /usr/share/swift || true
          sudo rm -rf /opt/ghc || true
          sudo rm -rf /usr/local/.ghcup || true
          sudo apt-get clean
          echo "Disk after cleanup:"
          df -h

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.35.5
          channel: stable
          cache: true

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('android/**/*.gradle*', 'android/gradle.properties', 'android/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Install Dependencies
        run: flutter pub get

      - name: Pre-install Android SDK components
        run: |
          set -euo pipefail
          SDK_ROOT="${ANDROID_HOME:-${ANDROID_SDK_ROOT:-/usr/local/lib/android/sdk}}"
          SDKMANAGER_BIN="${SDK_ROOT}/cmdline-tools/latest/bin/sdkmanager"
          if [ ! -x "${SDKMANAGER_BIN}" ]; then
            if command -v sdkmanager >/dev/null 2>&1; then
              SDKMANAGER_BIN="$(command -v sdkmanager)"
            else
              echo "::warning::sdkmanager not found; skipping explicit SDK component pre-install."
              exit 0
            fi
          fi
          yes | "${SDKMANAGER_BIN}" --licenses >/dev/null || true
          timeout 900 "${SDKMANAGER_BIN}" \
            "platform-tools" \
            "platforms;android-30" \
            "platforms;android-33" \
            "build-tools;34.0.0" \
            "build-tools;35.0.0" \
            "cmake;3.22.1" \
            "emulator" \
            "system-images;android-33;google_apis;x86_64" \
            "ndk;27.0.12077973"

      - name: Enable KVM for emulator
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm
          ls -l /dev/kvm || true

      - name: Prewarm Android build toolchain
        run: |
          set -euo pipefail
          export GRADLE_OPTS="-Dorg.gradle.daemon=false -Dorg.gradle.workers.max=2"
          set +e
          timeout 1200 flutter build apk --debug --flavor dev --dart-define=JIVE_E2E=true --no-pub
          PREWARM_EXIT=$?
          set -e
          if [ "${PREWARM_EXIT}" -ne 0 ]; then
            echo "::warning::Prewarm failed with exit ${PREWARM_EXIT}; continuing to emulator test run."
          fi

      - name: Run Android integration_test (emulator, manual)
        run: |
          set -euo pipefail
          SDK_ROOT="${ANDROID_HOME:-${ANDROID_SDK_ROOT:-/usr/local/lib/android/sdk}}"
          AVD_NAME="ci_api33_google_apis_x86_64"
          EMULATOR_SERIAL="emulator-5554"

          AVDMANAGER_BIN="${SDK_ROOT}/cmdline-tools/latest/bin/avdmanager"
          EMULATOR_BIN="${SDK_ROOT}/emulator/emulator"
          if [ ! -x "${AVDMANAGER_BIN}" ]; then
            AVDMANAGER_BIN="$(command -v avdmanager)"
          fi
          if [ ! -x "${EMULATOR_BIN}" ]; then
            EMULATOR_BIN="$(command -v emulator)"
          fi

          export PATH="${SDK_ROOT}/platform-tools:${SDK_ROOT}/emulator:${PATH}"

          cleanup() {
            adb -s "${EMULATOR_SERIAL}" emu kill >/dev/null 2>&1 || true
            pkill -f "emulator.*-avd ${AVD_NAME}" >/dev/null 2>&1 || true
          }
          trap cleanup EXIT

          adb kill-server || true
          adb start-server
          adb devices

          echo no | "${AVDMANAGER_BIN}" create avd --force \
            -n "${AVD_NAME}" \
            --abi "google_apis/x86_64" \
            --package "system-images;android-33;google_apis;x86_64" \
            --device "Nexus 6" \
            --sdcard "512M"

          AVD_CONFIG="${HOME}/.android/avd/${AVD_NAME}.avd/config.ini"
          if [ -f "${AVD_CONFIG}" ]; then
            {
              echo "hw.cpu.ncore=4"
              echo "hw.ramSize=4096"
              echo "hw.heapSize=1024"
              echo "disk.dataPartition.size=4096M"
            } >> "${AVD_CONFIG}"
          else
            echo "::warning::AVD config not found at ${AVD_CONFIG}; continuing without config patch."
          fi

          "${EMULATOR_BIN}" \
            -port 5554 \
            -avd "${AVD_NAME}" \
            -no-window \
            -no-snapshot \
            -noaudio \
            -no-boot-anim \
            -no-metrics \
            -gpu swiftshader_indirect \
            -cores 4 \
            -memory 4096 \
            >/tmp/android-emulator.log 2>&1 &

          BOOT_DEADLINE=$((SECONDS + 420))
          until adb -s "${EMULATOR_SERIAL}" shell getprop sys.boot_completed 2>/dev/null | tr -d '\r' | grep -q '^1$'; do
            if [ "${SECONDS}" -ge "${BOOT_DEADLINE}" ]; then
              echo "::error::Emulator boot timeout"
              tail -n 200 /tmp/android-emulator.log || true
              exit 1
            fi
            sleep 5
          done

          adb -s "${EMULATOR_SERIAL}" wait-for-device
          adb -s "${EMULATOR_SERIAL}" shell settings put global window_animation_scale 0 || true
          adb -s "${EMULATOR_SERIAL}" shell settings put global transition_animation_scale 0 || true
          adb -s "${EMULATOR_SERIAL}" shell settings put global animator_duration_scale 0 || true
          adb -s "${EMULATOR_SERIAL}" shell settings put secure spell_checker_enabled 0 || true

          export GRADLE_OPTS="-Dorg.gradle.daemon=false -Dorg.gradle.workers.max=2"
          flutter devices
          timeout 1800 bash scripts/run_integration_tests.sh --combined-suite --skip-pub-get --retry 0 --timeout 720 --test-case-timeout 20m --ignore-test-timeouts --device-recovery-retry 2 --device-recovery-timeout 60 --allow-emulator-reboot "${EMULATOR_SERIAL}"
