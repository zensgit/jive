name: Flutter CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      build_release_candidate:
        description: "Build Android release candidate app bundle"
        required: false
        type: boolean
        default: false
      require_release_signing:
        description: "Require production Android signing for release candidate"
        required: false
        type: boolean
        default: false
      build_ios_release_candidate:
        description: "Build iOS release candidate without codesign"
        required: false
        type: boolean
        default: false
      run_android_e2e:
        description: "Run Android integration_test on emulator"
        required: false
        type: boolean
        default: false
      run_release_smoke:
        description: "Run release smoke lane on host"
        required: false
        type: boolean
        default: false

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze_and_test:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.35.5
          channel: stable
          cache: true

      - name: Flutter Version
        run: flutter --version

      - name: Install Dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze

      - name: Test
        run: flutter test

  android_release_candidate:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    if: >-
      github.event_name == 'workflow_dispatch' &&
      github.event.inputs.build_release_candidate == 'true'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.35.5
          channel: stable
          cache: true

      - name: Build Android Release Candidate
        env:
          JIVE_RELEASE_CANDIDATE_STRICT_SIGNING: ${{ github.event.inputs.require_release_signing == 'true' && 'true' || '' }}
        run: bash scripts/build_release_candidate.sh

      - name: Publish Release Candidate Summary
        if: always()
        run: bash scripts/render_release_report_summary.sh android-candidate

      - name: Upload Release Candidate Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-release-candidate-${{ github.run_id }}
          path: |
            build/release-candidate/**
            build/reports/release-candidate/**
          if-no-files-found: error

  ios_release_candidate:
    runs-on: macos-latest
    timeout-minutes: 45
    if: >-
      github.event_name == 'workflow_dispatch' &&
      github.event.inputs.build_ios_release_candidate == 'true'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.35.5
          channel: stable
          cache: true

      - name: Build iOS Release Candidate
        run: bash scripts/build_ios_release_candidate.sh

      - name: Publish iOS Release Candidate Summary
        if: always()
        run: bash scripts/render_release_report_summary.sh ios-candidate

      - name: Upload iOS Release Candidate Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ios-release-candidate-${{ github.run_id }}
          path: |
            build/ios-release-candidate/**
            build/reports/ios-release-candidate/**
          if-no-files-found: error

  release_smoke_host:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    if: >-
      (github.event_name == 'workflow_dispatch' && github.event.inputs.run_release_smoke == 'true') ||
      (github.event_name == 'pull_request' && contains(github.event.pull_request.labels.*.name, 'release-smoke')) ||
      (github.event_name == 'push' && github.ref == 'refs/heads/main')

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.35.5
          channel: stable
          cache: true

      - name: Install Dependencies
        run: flutter pub get

      - name: Run Release Smoke Lane
        run: bash scripts/run_release_smoke.sh

      - name: Summarize Release Reports
        if: always()
        run: bash scripts/render_release_report_summary.sh host

      - name: Upload Host Smoke Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: release-smoke-host-${{ github.run_id }}
          path: |
            build/android-e2e-smoke/**
            build/reports/**
          if-no-files-found: ignore

  android_integration_test:
    runs-on: ubuntu-latest
    timeout-minutes: 50
    if: >-
      (github.event_name == 'workflow_dispatch' && github.event.inputs.run_android_e2e == 'true') ||
      (github.event_name == 'pull_request' && contains(github.event.pull_request.labels.*.name, 'e2e')) ||
      (github.event_name == 'push' && github.ref == 'refs/heads/main')

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.35.5
          channel: stable
          cache: true

      - name: Install Dependencies
        run: flutter pub get

      - name: Run Android integration_test (emulator)
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          target: google_apis
          arch: x86_64
          disable-animations: true
          emulator-options: -no-window -no-snapshot -noaudio -no-boot-anim
          script: >-
            bash scripts/run_release_regression_suite.sh &&
            JIVE_ANDROID_E2E_DEVICE=emulator-5554
            JIVE_ANDROID_E2E_FLAVOR=dev
            JIVE_ANDROID_E2E_BOOT_TIMEOUT_SECONDS=300
            JIVE_ANDROID_E2E_ADB_COMMAND_TIMEOUT_SECONDS=30
            bash scripts/run_android_e2e_smoke.sh

      - name: Summarize Android Release Reports
        if: always()
        run: bash scripts/render_release_report_summary.sh android

      - name: Upload Android E2E Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-e2e-smoke-${{ github.run_id }}
          path: |
            build/android-e2e-smoke/**
            build/reports/**
          if-no-files-found: ignore
