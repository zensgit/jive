name: SaaS Release Candidate

on:
  workflow_dispatch:
    inputs:
      build_appbundle:
        description: "Build the Android prod release appbundle after readiness checks"
        required: false
        type: boolean
        default: false
      strict_signing:
        description: "Require Android release signing"
        required: false
        type: boolean
        default: false
      flavor:
        description: "Flutter flavor"
        required: true
        type: choice
        default: prod
        options:
          - prod
      build_name:
        description: "Optional Flutter build-name override"
        required: false
        type: string
      build_number:
        description: "Optional Flutter build-number override"
        required: false
        type: string

concurrency:
  group: saas-release-candidate-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  release_candidate:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Guard production release secrets
        env:
          PRODUCTION_SUPABASE_URL: ${{ secrets.PRODUCTION_SUPABASE_URL }}
          PRODUCTION_SUPABASE_ANON_KEY: ${{ secrets.PRODUCTION_SUPABASE_ANON_KEY }}
          PRODUCTION_ADMOB_APP_ID: ${{ secrets.PRODUCTION_ADMOB_APP_ID }}
          PRODUCTION_ADMOB_BANNER_ID: ${{ secrets.PRODUCTION_ADMOB_BANNER_ID }}
          ANDROID_RELEASE_KEYSTORE_BASE64: ${{ secrets.ANDROID_RELEASE_KEYSTORE_BASE64 }}
          ANDROID_RELEASE_STORE_PASSWORD: ${{ secrets.ANDROID_RELEASE_STORE_PASSWORD }}
          ANDROID_RELEASE_KEY_ALIAS: ${{ secrets.ANDROID_RELEASE_KEY_ALIAS }}
          ANDROID_RELEASE_KEY_PASSWORD: ${{ secrets.ANDROID_RELEASE_KEY_PASSWORD }}
        run: |
          set -euo pipefail

          missing=()
          required=(
            PRODUCTION_SUPABASE_URL
            PRODUCTION_SUPABASE_ANON_KEY
            PRODUCTION_ADMOB_APP_ID
            PRODUCTION_ADMOB_BANNER_ID
          )

          if [[ "${{ inputs.strict_signing }}" == "true" ]]; then
            required+=(
              ANDROID_RELEASE_KEYSTORE_BASE64
              ANDROID_RELEASE_STORE_PASSWORD
              ANDROID_RELEASE_KEY_ALIAS
              ANDROID_RELEASE_KEY_PASSWORD
            )
          fi

          for key in "${required[@]}"; do
            if [[ -z "${!key:-}" ]]; then
              missing+=("$key")
            fi
          done

          if (( ${#missing[@]} > 0 )); then
            printf 'Missing required production release secrets:\n' >&2
            printf ' - %s\n' "${missing[@]}" >&2
            printf '\nDry-run requires production Supabase and AdMob client values. Strict signing also requires Android release keystore secrets.\n' >&2
            exit 1
          fi

      - name: Mask production secret values
        env:
          PRODUCTION_SUPABASE_URL: ${{ secrets.PRODUCTION_SUPABASE_URL }}
          PRODUCTION_SUPABASE_ANON_KEY: ${{ secrets.PRODUCTION_SUPABASE_ANON_KEY }}
          PRODUCTION_ADMIN_API_ALLOWED_ORIGINS: ${{ secrets.PRODUCTION_ADMIN_API_ALLOWED_ORIGINS }}
          PRODUCTION_PAYMENT_CHANNEL: ${{ secrets.PRODUCTION_PAYMENT_CHANNEL }}
          PRODUCTION_ADMOB_APP_ID: ${{ secrets.PRODUCTION_ADMOB_APP_ID }}
          PRODUCTION_ADMOB_BANNER_ID: ${{ secrets.PRODUCTION_ADMOB_BANNER_ID }}
          ANDROID_RELEASE_KEYSTORE_BASE64: ${{ secrets.ANDROID_RELEASE_KEYSTORE_BASE64 }}
          ANDROID_RELEASE_STORE_PASSWORD: ${{ secrets.ANDROID_RELEASE_STORE_PASSWORD }}
          ANDROID_RELEASE_KEY_ALIAS: ${{ secrets.ANDROID_RELEASE_KEY_ALIAS }}
          ANDROID_RELEASE_KEY_PASSWORD: ${{ secrets.ANDROID_RELEASE_KEY_PASSWORD }}
        run: |
          set -euo pipefail
          keys=(
            PRODUCTION_SUPABASE_URL
            PRODUCTION_SUPABASE_ANON_KEY
            PRODUCTION_ADMIN_API_ALLOWED_ORIGINS
            PRODUCTION_PAYMENT_CHANNEL
            PRODUCTION_ADMOB_APP_ID
            PRODUCTION_ADMOB_BANNER_ID
            ANDROID_RELEASE_KEYSTORE_BASE64
            ANDROID_RELEASE_STORE_PASSWORD
            ANDROID_RELEASE_KEY_ALIAS
            ANDROID_RELEASE_KEY_PASSWORD
          )

          for key in "${keys[@]}"; do
            value="${!key:-}"
            if [[ -n "$value" ]]; then
              printf '::add-mask::%s\n' "$value"
            fi
          done

      - name: Setup Java
        if: ${{ inputs.build_appbundle }}
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Flutter
        if: ${{ inputs.build_appbundle }}
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.35.5
          channel: stable
          cache: true

      - name: Create production env file
        env:
          SUPABASE_URL: ${{ secrets.PRODUCTION_SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.PRODUCTION_SUPABASE_ANON_KEY }}
          ADMIN_API_ALLOWED_ORIGINS: ${{ secrets.PRODUCTION_ADMIN_API_ALLOWED_ORIGINS }}
          PAYMENT_CHANNEL: ${{ secrets.PRODUCTION_PAYMENT_CHANNEL }}
          ADMOB_APP_ID: ${{ secrets.PRODUCTION_ADMOB_APP_ID }}
          ADMOB_BANNER_ID: ${{ secrets.PRODUCTION_ADMOB_BANNER_ID }}
        run: |
          set -euo pipefail
          env_file="$RUNNER_TEMP/jive-saas-production.env"
          touch "$env_file"
          chmod 600 "$env_file"
          {
            printf 'SUPABASE_URL=%s\n' "$SUPABASE_URL"
            printf 'SUPABASE_ANON_KEY=%s\n' "$SUPABASE_ANON_KEY"
            printf 'ADMIN_API_ALLOWED_ORIGINS=%s\n' "${ADMIN_API_ALLOWED_ORIGINS:-}"
            printf 'PAYMENT_CHANNEL=%s\n' "${PAYMENT_CHANNEL:-google_play}"
            printf 'ENABLE_STORE_BILLING=true\n'
            printf 'ENABLE_WECHAT_PAY=false\n'
            printf 'ENABLE_ALIPAY=false\n'
            printf 'DOMESTIC_PAYMENT_MOCK_BASE_URL=\n'
            printf 'ADMOB_APP_ID=%s\n' "$ADMOB_APP_ID"
            printf 'ADMOB_BANNER_ID=%s\n' "$ADMOB_BANNER_ID"
          } > "$env_file"
          echo "PRODUCTION_ENV_FILE=$env_file" >> "$GITHUB_ENV"

      - name: Restore Android release signing
        if: ${{ inputs.strict_signing }}
        env:
          ANDROID_RELEASE_KEYSTORE_BASE64: ${{ secrets.ANDROID_RELEASE_KEYSTORE_BASE64 }}
          ANDROID_RELEASE_STORE_PASSWORD: ${{ secrets.ANDROID_RELEASE_STORE_PASSWORD }}
          ANDROID_RELEASE_KEY_ALIAS: ${{ secrets.ANDROID_RELEASE_KEY_ALIAS }}
          ANDROID_RELEASE_KEY_PASSWORD: ${{ secrets.ANDROID_RELEASE_KEY_PASSWORD }}
        run: |
          set -euo pipefail
          keystore_file="$RUNNER_TEMP/jive-release.keystore"
          printf '%s' "$ANDROID_RELEASE_KEYSTORE_BASE64" | base64 --decode > "$keystore_file"
          chmod 600 "$keystore_file"
          {
            printf 'JIVE_ANDROID_STORE_FILE=%s\n' "$keystore_file"
            printf 'JIVE_ANDROID_STORE_PASSWORD=%s\n' "$ANDROID_RELEASE_STORE_PASSWORD"
            printf 'JIVE_ANDROID_KEY_ALIAS=%s\n' "$ANDROID_RELEASE_KEY_ALIAS"
            printf 'JIVE_ANDROID_KEY_PASSWORD=%s\n' "$ANDROID_RELEASE_KEY_PASSWORD"
          } >> "$GITHUB_ENV"

      - name: Run release candidate lane
        env:
          JIVE_RELEASE_CANDIDATE_FLAVOR: ${{ inputs.flavor }}
          JIVE_RELEASE_CANDIDATE_STRICT_SIGNING: ${{ inputs.strict_signing }}
          JIVE_RELEASE_CANDIDATE_DRY_RUN: ${{ inputs.build_appbundle != true }}
          JIVE_RELEASE_CANDIDATE_BUILD_NAME: ${{ inputs.build_name }}
          JIVE_RELEASE_CANDIDATE_BUILD_NUMBER: ${{ inputs.build_number }}
        run: |
          set -euo pipefail
          args=()
          if [[ -z "${JIVE_RELEASE_CANDIDATE_BUILD_NAME:-}" ]]; then
            unset JIVE_RELEASE_CANDIDATE_BUILD_NAME
          fi
          if [[ -z "${JIVE_RELEASE_CANDIDATE_BUILD_NUMBER:-}" ]]; then
            unset JIVE_RELEASE_CANDIDATE_BUILD_NUMBER
          fi
          bash scripts/build_release_candidate.sh "${args[@]}"

      - name: Guard release candidate artifacts
        if: always()
        run: |
          set -euo pipefail
          roots=()
          [[ -d build/reports/release-candidate ]] && roots+=(build/reports/release-candidate)
          [[ -d build/release-candidate ]] && roots+=(build/release-candidate)

          if (( ${#roots[@]} == 0 )); then
            exit 0
          fi

          blocked_file="$(mktemp)"
          trap 'rm -f "$blocked_file"' EXIT

          find "${roots[@]}" -type f \
              \( \
                -name '*.env' -o \
                -name '*.pem' -o \
                -name '*.key' -o \
                -iname '*secret*' -o \
                -iname '*secrets*' -o \
                -iname '*credential*' -o \
                -iname '*credentials*' -o \
                -iname '*dart-defines*' \
              \) | sort > "$blocked_file"

          if [[ -s "$blocked_file" ]]; then
            printf 'Release candidate artifact guard blocked sensitive-looking files:\n' >&2
            sed 's/^/ - /' "$blocked_file" >&2
            exit 1
          fi

      - name: Publish release candidate summary
        if: always()
        run: |
          set -euo pipefail
          summary_file="build/reports/release-candidate/latest.md"
          if [[ -f "$summary_file" ]]; then
            cat "$summary_file" >> "$GITHUB_STEP_SUMMARY"
          else
            printf '# SaaS Release Candidate\n\nNo release candidate summary was generated.\n' >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload release candidate reports
        if: always()
        continue-on-error: true
        uses: actions/upload-artifact@v7
        with:
          name: saas-release-candidate-${{ github.run_id }}
          path: |
            build/reports/release-candidate
            build/release-candidate
          if-no-files-found: warn
